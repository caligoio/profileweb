<!DOCTYPE html>
<html>
<head>
    <title>Simple Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        table {
            width: 60%;
            border-collapse: collapse;
            margin: 20px auto;
        }

        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>John</td>
            <td>22</td>
            <td>Jakarta</td>
        </tr>
        <tr>
            <td>Anna</td>
            <td>24</td>
            <td>Bandung</td>
        </tr>
        <tr>
            <td>David</td>
            <td>21</td>
            <td>Surabaya</td>
        </tr>
    </table>

</body>
</html>
